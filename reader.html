<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reader</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="nav-container">
                <img src="photo.png" alt="Roman Bharati" class="nav-photo">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="experience.html">Experience</a></li>
                    <li><a href="projects.html">Projects</a></li>
                    <li><a href="essays.html" class="active">Essays</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <section class="content">
            <div class="reader-header">
                <a class="btn btn-secondary" href="essays.html">← Back to Essays</a>
                <div class="reader-title">
                    <p class="kicker">PDF reader</p>
                    <h2 id="readerTitle">Article</h2>
                </div>
            </div>

            <div class="pdf-shell">
                <iframe id="pdfFrame" class="pdf-frame" title="PDF viewer"></iframe>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Roman Bharati</p>
    </footer>

    <script>
        const params = new URLSearchParams(window.location.search);
        const pdf = params.get('pdf');
        const title = params.get('title');

        const frame = document.getElementById('pdfFrame');
        const titleEl = document.getElementById('readerTitle');

        if (title) titleEl.textContent = title;
        if (pdf) {
            frame.src = pdf;
        } else {
            titleEl.textContent = 'Missing PDF';
            frame.replaceWith(Object.assign(document.createElement('div'), {
                className: 'reader-error',
                textContent: 'No PDF specified. Go back and pick an article.'
            }));
        }
    </script>
</body>
</html>
